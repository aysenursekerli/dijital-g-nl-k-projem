<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dijital Günlük</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Geçiçleri yumuşak yöneten Ana Uygulama Sarıcısı -->
    <div id="app">
        
        <!-- ==================== AŞAMA 1: KÜTÜPHANE ==================== -->
        <div id="view-library" class="view-layer active">
            <div class="library-container">
                <h1 class="library-title">Günlüklerim</h1>
                <div class="library-grid">
                    <!-- Yeni Ekle Kartı -->
                    <div class="book-card add-new" id="add-new-btn">
                        <span class="plus-icon">➕</span>
                        <p>Yeni Günlük Ekle</p>
                    </div>
                    <!-- Örnek Günlük Kartı -->
                    <div class="book-card" id="open-sample-book">
                        <div class="book-cover-design">
                            <h3 class="book-title">Dijital Ajanda</h3>
                            <div class="book-date">Nisan 2026</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ==================== AŞAMA 2: DEFTER ÖN İZLEME (KİTAP MODU) ==================== -->
        <div id="view-preview" class="view-layer">
            <div class="preview-header">
                <button class="nav-btn" id="btn-return-library">🔙 Kütüphaneye Dön</button>
            </div>
            
            <div class="container" id="main-container">
                <div class="book" id="book">
                    <!-- Kapak (Ön) -->
                    <div class="page page-cover page-cover-top" data-density="hard">
                        <div class="page-content">
                            <h2>Dijital Günlük</h2>
                        </div>
                    </div>

                    <!-- Orijinal Sayfalar (4 Adet) -->
                    <div class="page" data-page="1">
                        <div class="page-content">
                            <button class="edit-page-btn" title="Bu Sayfayı Düzenle">📝 Düzenle</button>
                            <h3 class="page-header">Sayfa 1</h3>
                            <div class="page-text">Buraya içerik gelecek...</div>
                            <div class="page-footer">1</div>
                        </div>
                        <canvas class="drawing-layer"></canvas>
                    </div>
                    <div class="page" data-page="2">
                        <div class="page-content">
                            <button class="edit-page-btn" title="Bu Sayfayı Düzenle">📝 Düzenle</button>
                            <h3 class="page-header">Sayfa 2</h3>
                            <div class="page-text">Buraya içerik gelecek...</div>
                            <div class="page-footer">2</div>
                        </div>
                        <canvas class="drawing-layer"></canvas>
                    </div>
                    <div class="page" data-page="3">
                        <div class="page-content">
                            <button class="edit-page-btn" title="Bu Sayfayı Düzenle">📝 Düzenle</button>
                            <h3 class="page-header">Sayfa 3</h3>
                            <div class="page-text">Buraya içerik gelecek...</div>
                            <div class="page-footer">3</div>
                        </div>
                        <canvas class="drawing-layer"></canvas>
                    </div>
                    <div class="page" data-page="4">
                        <div class="page-content">
                            <button class="edit-page-btn" title="Bu Sayfayı Düzenle">📝 Düzenle</button>
                            <h3 class="page-header">Sayfa 4</h3>
                            <div class="page-text">Buraya içerik gelecek...</div>
                            <div class="page-footer">4</div>
                        </div>
                        <canvas class="drawing-layer"></canvas>
                    </div>

                    <!-- Kapak (Arka) -->
                    <div class="page page-cover page-cover-bottom" data-density="hard">
                        <div class="page-content">
                            <h2>Son</h2>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ==================== AŞAMA 3: TEK SAYFA DÜZENLEME (EDİT MODU) ==================== -->
        <div id="view-edit" class="view-layer">
            
            <div class="edit-header">
                <button class="nav-btn primary-btn" id="btn-finish-edit">💾 Düzenlemeyi Bitir</button>
                
                <!-- Taşınan Araç Çubuğu -->
                <div class="toolbar" id="toolbar">
                    <button class="tool-btn active" data-tool="hand" title="El (Sayfa Kaydırma)">✋</button>
                    <button class="tool-btn" data-tool="pen" title="Kalem">✏️</button>
                    <button class="tool-btn" data-tool="eraser" title="Silgi">🧹</button>
                    <div class="tool-separator"></div>
                    <div class="color-palette" id="color-palette">
                        <button class="color-btn active" style="background-color: #333333;" data-color="#333333" title="Siyah"></button>
                        <button class="color-btn" style="background-color: #ef4444;" data-color="#ef4444" title="Kırmızı"></button>
                        <button class="color-btn" style="background-color: #3b82f6;" data-color="#3b82f6" title="Mavi"></button>
                        <button class="color-btn" style="background-color: #22c55e;" data-color="#22c55e" title="Yeşil"></button>
                        <button class="color-btn" style="background-color: #eab308;" data-color="#eab308" title="Sarı"></button>
                        <div class="color-wrapper" title="Özel Renk Seç">
                            <input type="color" id="color-picker" value="#333333">
                        </div>
                    </div>
                    <div class="range-wrapper" title="Fırça Kalınlığı">
                        <input type="range" id="size-picker" min="1" max="50" value="3">
                    </div>
                    <div class="tool-separator"></div>
                    <button class="tool-btn" id="undo-btn" title="Geri Al">↩️</button>
                    
                    <div class="dropdown">
                        <button class="tool-btn" title="Medya / Sticker Ekle">➕</button>
                        <div class="dropdown-content">
                            <label class="dropdown-item">
                                📷 Fotoğraf Yükle
                                <input type="file" id="image-upload" accept="image/*" style="display: none;">
                            </label>
                            <div class="dropdown-item sticker-btn" data-sticker="⭐">⭐ Yıldız Ekle</div>
                            <div class="dropdown-item sticker-btn" data-sticker="📌">📌 Raptiye Ekle</div>
                            <div class="dropdown-item sticker-btn" data-sticker="💡">💡 Fikir Ekle</div>
                        </div>
                    </div>
                    <button class="tool-btn danger" id="clear-btn" title="İçeriği Temizle">🗑️</button>
                </div>
            </div>

            <!-- Çizerken Zoom ve Pan İşlemlerinin Yapılacağı Tek Sayfa Alanı -->
            <div class="edit-workspace" id="edit-workspace">
                <div class="zoom-wrapper" id="zoom-wrapper">
                    <div class="fullscreen-canvas-wrapper" id="edit-page-slot">
                        <!-- Tıklanan sayfanın "canvas" ve "içeriği" geçici olarak buraya teleport edilecek -->
                    </div>
                </div>
            </div>
            
        </div>
    </div>

    <!-- Kütüphaneler -->
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>
    <script src="script.js"></script>
</body>
</html>
